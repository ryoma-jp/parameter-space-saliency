services:
  pss:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /work
    command: >
      bash -c "jupyter notebook"
    volumes:
      - type: bind
        source: .
        target: /work
    ports:
      - 35000:8888
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
